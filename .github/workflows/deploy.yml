name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build ROM & Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cc65
        run: sudo apt-get update && sudo apt-get install -y cc65

      - name: Assemble
        run: |
          mkdir -p Build
          ca65 src/main.s -g -o Build/main.o

      - name: Link
        run: |
          ld65 -t nes -o Build/HRS.nes Build/main.o --dbgfile Build/HRS.dbg

      - name: Verify ROM
        run: |
          if [ ! -f Build/HRS.nes ]; then
            echo "ROM file not found!"
            exit 1
          fi
          echo "ROM size: $(wc -c < Build/HRS.nes) bytes"

      - name: Generate GitHub Pages site
        run: |
          mkdir -p site
          cp Build/HRS.nes site/HRS.nes

          cat > site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Human Bootleg Machine – Play in Browser</title>
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                background: #111;
                color: #eee;
                font-family: "Segoe UI", system-ui, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                min-height: 100vh;
                padding: 1.5rem 1rem;
              }
              h1 { font-size: 1.6rem; margin-bottom: 0.4rem; color: #f90; }
              p.subtitle { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
              #game-container {
                width: 100%;
                max-width: 768px;
                aspect-ratio: 4/3;
                background: #000;
                border: 3px solid #333;
                border-radius: 6px;
                overflow: hidden;
              }
              .controls {
                margin-top: 1.2rem;
                font-size: 0.78rem;
                color: #666;
                text-align: center;
                line-height: 1.9;
              }
              .controls kbd {
                background: #222;
                border: 1px solid #444;
                border-radius: 3px;
                padding: 1px 5px;
                font-family: monospace;
                color: #ccc;
              }
            </style>
          </head>
          <body>
            <h1>Human Bootleg Machine</h1>
            <p class="subtitle">NES ROM — running in your browser</p>

            <div id="game-container"></div>

            <div class="controls">
              <strong>Controls</strong><br>
              D-Pad: <kbd>Arrow Keys</kbd> &nbsp;|&nbsp;
              A: <kbd>Z</kbd> &nbsp;|&nbsp;
              B: <kbd>X</kbd> &nbsp;|&nbsp;
              Start: <kbd>Enter</kbd> &nbsp;|&nbsp;
              Select: <kbd>Shift</kbd>
            </div>

            <script>
              window.EJS_player      = "#game-container";
              window.EJS_core        = "nes";
              window.EJS_gameUrl     = "HRS.nes";
              window.EJS_pathtodata  = "https://cdn.emulatorjs.org/stable/data/";
              window.EJS_startOnLoad = true;
              window.EJS_color       = "#f90";
            </script>
            <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
