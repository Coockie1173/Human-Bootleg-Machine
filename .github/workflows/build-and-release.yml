name: Build and Release NES ROM

on:
  push:
    tags:
      - 'v*'          
  workflow_dispatch:  

jobs:
  build:
    name: Build ROM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cc65
        run: sudo apt-get update && sudo apt-get install -y cc65

      - name: Assemble
        run: |
          mkdir -p Build
          ca65 src/main.s -g -o Build/main.o

      - name: Link
        run: |
          ld65 -t nes -o Build/HRS.nes Build/main.o --dbgfile Build/HRS.dbg

      - name: Verify ROM
        run: |
          if [ ! -f Build/HRS.nes ]; then
            echo "ROM file not found!"
            exit 1
          fi
          echo "ROM size: $(wc -c < Build/HRS.nes) bytes"
          MAGIC=$(xxd -p -l 4 Build/HRS.nes)
          if [ "$MAGIC" = "4e45531a" ]; then
            echo "iNES header valid."
          else
            echo "Warning: unexpected header bytes: $MAGIC"
          fi

      - name: Upload ROM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HRS-rom
          path: Build/HRS.nes

  release:
    name: Publish to GitHub Releases
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download ROM artifact
        uses: actions/download-artifact@v4
        with:
          name: HRS-rom
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Human Bootleg Machine ${{ github.ref_name }}"
          body: |
            ## Human Bootleg Machine — ${{ github.ref_name }}

            NES ROM built automatically from source using cc65.

            ### How to play
            Load `HRS.nes` in any NES emulator that supports iNES format
            (e.g. [Mesen](https://www.mesen.ca/), [FCEUX](https://fceux.com/)).
          files: dist/HRS.nes
          draft: false
          prerelease: false